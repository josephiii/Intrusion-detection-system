{% extends "base.html" %}
{% block content %}
<h1>Customer Support</h1>
<p>Submit a support ticket and our team will get back to you within 24 hours.</p>
<form method="POST" style="max-width:500px;">
    <label>Your Name:</label>
    <input type="text" name="author" placeholder="Full name">
    <label>Describe your issue:</label>
    <textarea name="content" rows="4" placeholder="How can we help you today?"></textarea>
    <button type="submit">Submit Ticket</button>
</form>
<h2>Recent Tickets</h2>
{% for t in tickets %}
<div class="ticket-box">
    <span class="author">{{ t['author'] }}</span>
    <span class="date"> — {{ t['created_at'] }}</span>
    <p style="margin-top:8px;">{{ t['content'] }}</p>
</div>
{% endfor %}
{% endblock %}
